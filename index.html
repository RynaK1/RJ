<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>R&amp;J - Daily Planner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section id="auth-view" class="auth-view" aria-labelledby="auth-title">
        <form id="auth-form" class="auth-panel">
          <h1 id="auth-title">Planner Login</h1>
          <div class="auth-mode-switcher" role="group" aria-label="Authentication mode">
            <button id="auth-sign-in-mode" class="auth-mode-btn active" type="button">Sign in</button>
            <button id="auth-sign-up-mode" class="auth-mode-btn" type="button">Create account</button>
          </div>
          <label for="auth-email">Email</label>
          <input id="auth-email" type="email" autocomplete="email" required />
          <label for="auth-password">Password</label>
          <input id="auth-password" type="password" autocomplete="current-password" minlength="6" required />
          <label id="auth-confirm-password-label" for="auth-confirm-password" hidden>Confirm password</label>
          <input
            id="auth-confirm-password"
            type="password"
            autocomplete="new-password"
            minlength="6"
            hidden
          />
          <button id="auth-submit-btn" class="auth-submit-btn" type="submit">Sign in</button>
          <p id="auth-message" class="auth-message" role="status"></p>
        </form>
      </section>

      <header id="app-header" class="app-header" hidden>
        <div class="header-controls">
          <button
            id="settings-open-btn"
            class="settings-trigger"
            type="button"
            aria-haspopup="dialog"
            aria-expanded="false"
            aria-controls="settings-modal"
            aria-label="Open settings"
            title="Settings"
          >
            <span aria-hidden="true">&#9881;</span>
          </button>
          <div class="list-set-switcher" role="group" aria-label="List set">
            <button class="list-set-switch active" type="button" data-list-set="rj">IRL</button>
            <button class="list-set-switch" type="button" data-list-set="schedms">MS</button>
          </div>
          <div id="planner-owner-switcher" class="planner-owner-switcher" role="group" aria-label="Planner owner" hidden>
            <button class="planner-owner-switch active" type="button" data-planner-owner="self">Mine</button>
            <button id="partner-owner-switch" class="planner-owner-switch" type="button" data-planner-owner="partner">Partner</button>
          </div>
        </div>
        <div class="pixel-party" aria-hidden="true">
          <span class="pixel-character pixel-character-scout">
            <span class="pixel-hair"></span>
            <span class="pixel-face"></span>
            <span class="pixel-body"></span>
            <span class="pixel-boots"></span>
          </span>
          <span class="pixel-character pixel-character-mage">
            <span class="pixel-hair"></span>
            <span class="pixel-face"></span>
            <span class="pixel-body"></span>
            <span class="pixel-boots"></span>
          </span>
        </div>
        <div class="header-session">
          <span id="auth-user-label" class="auth-user-label"></span>
          <button id="auth-sign-out-btn" class="auth-sign-out-btn" type="button">Sign out</button>
          <div class="status-pill" id="save-status">Auto-saved</div>
        </div>
      </header>

      <section id="lists-view" hidden>
        <section class="rj-progress" aria-label="IRL completion progress" hidden>
          <div class="progress-labels">
            <span>0%</span>
            <strong id="rj-progress-label">0%</strong>
            <span>100%</span>
          </div>
          <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="rj-progress-fill" class="progress-fill"></div>
          </div>
        </section>
        <section id="schedms-quick-add" class="schedms-quick-add" aria-label="Add MS task">
          <form id="schedms-add-form" class="schedms-add-form">
            <label class="sr-only" for="schedms-input">Add MS task</label>
            <input id="schedms-input" type="text" maxlength="100" placeholder="Add task" required />
            <label class="sr-only" for="schedms-target-list">Choose list</label>
            <select id="schedms-target-list" aria-label="Choose list">
              <option value="daily">Daily</option>
              <option value="weekly">Weekly</option>
              <option value="persistent">To-Do</option>
            </select>
            <button class="add-task-submit-btn" type="submit" aria-label="Add MS task" title="Add task"></button>
            <button
              class="edit-cancel-btn"
              type="button"
              data-cancel-edit="schedms"
              aria-label="Cancel edit"
              title="Cancel edit"
              hidden
            >
              &times;
            </button>
          </form>
          <p id="schedms-add-error" class="form-msg" role="alert"></p>
        </section>
        <div class="list-stack">
          <section class="todo-card daily-card" data-list="daily">
            <div class="card-header">
              <h2>Daily</h2>
              <div class="card-meta">
                <span id="daily-reset-label" class="reset-label"></span>
              </div>
            </div>
            <form class="add-task-form" data-list="daily">
              <label class="sr-only" for="daily-input">Add daily task</label>
              <input id="daily-input" type="text" maxlength="100" placeholder="Add something for today" required />
              <button class="add-task-submit-btn" type="submit" aria-label="Add daily task" title="Add task"></button>
              <button class="edit-cancel-btn" type="button" data-cancel-edit="daily" aria-label="Cancel edit" title="Cancel edit" hidden>
                &times;
              </button>
            </form>
            <p id="daily-error" class="form-msg" role="alert"></p>
            <ul id="daily-list" class="task-list"></ul>
            <p id="daily-empty" class="empty-msg">No tasks</p>
          </section>

          <section class="todo-card weekly-card" data-list="weekly">
            <div class="card-header">
              <h2>Weekly</h2>
              <div class="card-meta">
                <span id="weekly-reset-label" class="reset-label"></span>
              </div>
            </div>
            <form class="add-task-form" data-list="weekly">
              <label class="sr-only" for="weekly-input">Add weekly task</label>
              <input id="weekly-input" type="text" maxlength="100" placeholder="Add weekly focus" required />
              <button class="add-task-submit-btn" type="submit" aria-label="Add weekly task" title="Add task"></button>
              <button class="edit-cancel-btn" type="button" data-cancel-edit="weekly" aria-label="Cancel edit" title="Cancel edit" hidden>
                &times;
              </button>
            </form>
            <p id="weekly-error" class="form-msg" role="alert"></p>
            <ul id="weekly-list" class="task-list"></ul>
            <p id="weekly-empty" class="empty-msg">No tasks</p>
          </section>

          <section class="todo-card persistent-card" data-list="persistent">
            <div class="card-header">
              <h2>To-Do</h2>
            </div>
            <form class="add-task-form" data-list="persistent">
              <label class="sr-only" for="persistent-input">Add to-do task</label>
              <input id="persistent-input" type="text" maxlength="100" placeholder="Add to-do item" required />
              <button class="add-task-submit-btn" type="submit" aria-label="Add to-do task" title="Add task"></button>
              <button
                class="edit-cancel-btn"
                type="button"
                data-cancel-edit="persistent"
                aria-label="Cancel edit"
                title="Cancel edit"
                hidden
              >
                &times;
              </button>
              <button
                id="recurring-toggle-btn"
                class="recurring-toggle-btn"
                type="button"
                aria-expanded="false"
                aria-controls="recurring-form"
                aria-label="Task options"
                title="Task options"
              >
                <span aria-hidden="true">&#8943;</span>
                <span class="sr-only">Task options</span>
              </button>
              <aside id="recurring-panel" class="recurring-panel" aria-label="Scheduled tasks" hidden>
                <button
                  id="recurring-panel-toggle"
                  class="recurring-panel-toggle"
                  type="button"
                  aria-expanded="false"
                  aria-controls="recurring-panel-content"
                  aria-label="Scheduled tasks"
                  title="Scheduled tasks"
                >
                  <span class="recurring-panel-toggle-copy" aria-hidden="true">&#9719;</span>
                  <span id="recurring-panel-count" class="sr-only">0</span>
                </button>
                <section id="recurring-panel-content" class="recurring-panel-content" hidden>
                  <div class="recurring-panel-header">
                    <h2>Scheduled</h2>
                  </div>
                  <ul id="recurring-panel-list" class="recurring-panel-list"></ul>
                  <p id="recurring-panel-empty" class="empty-msg">No scheduled tasks</p>
                </section>
              </aside>
            </form>
            <div id="recurring-tools" class="recurring-tools" hidden>
              <div id="recurring-form" class="recurring-form" hidden>
                <label class="sr-only" for="recurring-interval">Task option</label>
                <select id="recurring-interval" aria-label="Task option">
                  <option value="one-time">One-time</option>
                  <option value="1">Daily</option>
                  <option value="7">Weekly</option>
                </select>
                <fieldset class="recurring-days-field">
                  <legend>Show on</legend>
                  <div id="recurring-show-days" class="day-picker" aria-label="Show recurring task on days"></div>
                </fieldset>
              </div>
            </div>
            <p id="recurring-error" class="form-msg recurring-msg" role="alert"></p>
            <p id="persistent-error" class="form-msg" role="alert"></p>
            <ul id="persistent-list" class="task-list"></ul>
            <p id="persistent-empty" class="empty-msg">No tasks</p>
          </section>
        </div>
      </section>

      <div id="settings-modal" class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settings-title" hidden>
        <button class="settings-backdrop" type="button" data-settings-close aria-label="Close settings"></button>
        <section class="todo-card options-card settings-dialog">
          <div class="settings-dialog-header">
            <h2 id="settings-title">
              <span class="settings-title-icon" aria-hidden="true">&#9881;</span>
              <span>Settings</span>
            </h2>
            <button id="settings-close-btn" class="settings-close-btn" type="button" aria-label="Close settings">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="option-row pairing-option">
            <label>Pair account</label>
            <div id="pairing-controls" class="pairing-controls">
              <form id="pairing-form" class="pairing-form">
                <label class="sr-only" for="pairing-email">Partner email</label>
                <input id="pairing-email" type="email" autocomplete="email" placeholder="Registered email" required />
                <button id="pairing-invite-btn" type="submit">Invite</button>
              </form>
              <div id="pairing-incoming" class="pairing-card" hidden>
                <span id="pairing-incoming-copy"></span>
                <div class="pairing-actions">
                  <button id="pairing-accept-btn" type="button">Accept</button>
                  <button id="pairing-decline-btn" type="button">Decline</button>
                </div>
              </div>
              <div id="pairing-outgoing" class="pairing-card" hidden>
                <span id="pairing-outgoing-copy"></span>
                <button id="pairing-cancel-btn" type="button">Cancel</button>
              </div>
              <div id="pairing-connected" class="pairing-card" hidden>
                <div class="pairing-connected-summary">
                  <span id="pairing-connected-copy"></span>
                  <div class="pairing-actions">
                    <button id="paired-name-toggle-btn" type="button" aria-controls="paired-name-editor" aria-expanded="false">
                      Change name
                    </button>
                    <button id="pairing-remove-btn" type="button">Remove</button>
                  </div>
                </div>
                <div id="paired-name-editor" class="paired-name-editor" hidden>
                  <label class="sr-only" for="paired-display-name">Change name</label>
                  <input id="paired-display-name" type="text" maxlength="15" placeholder="Partner" autocomplete="off" />
                </div>
              </div>
              <p id="pairing-message" class="pairing-message" role="status"></p>
            </div>
          </div>
          <div class="option-row">
            <label for="timezone-offset">Time zone</label>
            <select id="timezone-offset"></select>
          </div>
          <div class="option-row checkbox-option">
            <label for="dst-adjustment">
              <input id="dst-adjustment" type="checkbox" />
              <span>Daylight saving time</span>
            </label>
          </div>
          <form id="password-form" class="option-row account-form">
            <button id="password-toggle-btn" type="button" aria-controls="password-fields" aria-expanded="false">
              Change password
            </button>
            <div id="password-fields" class="password-fields" hidden>
              <label class="sr-only" for="new-password">New password</label>
              <input id="new-password" type="password" autocomplete="new-password" minlength="6" placeholder="New password" />
              <label class="sr-only" for="confirm-new-password">Confirm new password</label>
              <input
                id="confirm-new-password"
                type="password"
                autocomplete="new-password"
                minlength="6"
                placeholder="Confirm new password"
              />
              <div class="password-actions">
                <button id="password-submit-btn" type="submit">Update password</button>
                <button id="password-cancel-btn" type="button">Cancel</button>
              </div>
            </div>
            <p id="password-message" class="account-message" role="status" hidden></p>
          </form>
          <div class="option-row account-delete-option">
            <div class="account-delete-control">
              <button id="delete-account-start-btn" class="account-delete-start-btn" type="button">Delete account</button>
              <div id="delete-account-confirm" class="account-delete-confirm" role="alertdialog" hidden>
                <p>This permanently deletes your account and unpairs your planner.</p>
                <label for="delete-account-confirm-input">Type DELETE to confirm</label>
                <input id="delete-account-confirm-input" type="text" autocomplete="off" />
                <div class="account-confirm-actions">
                  <button id="delete-account-cancel-btn" type="button">Cancel</button>
                  <button id="delete-account-confirm-btn" class="confirm-delete-btn" type="button" disabled>
                    Delete account
                  </button>
                </div>
              </div>
              <p id="delete-account-message" class="account-message" role="status"></p>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
